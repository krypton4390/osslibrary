<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Library | OSS PUSTAKALAYA</title>
    <meta name="description" content="Read books online at OSS Pustakalaya e-library.">
    <link rel="stylesheet" href="style.css">
    <style>
        body { display:flex; min-height:100vh; background:#020617; }
        .dashboard-container { display:flex; width:100%; }
        .status-badge { position:fixed; top:5px; left:5px; z-index:9999; font-size:10px; padding:2px 8px; border-radius:3px; color:white; font-weight:bold; }
        .status-badge.success { background: #10b981 !important; box-shadow: 0 0 12px rgba(16,185,129,0.5); }
        .btn-sync.ready { background: #6366f1 !important; color: white !important; font-weight: 700; border: 1px solid #818cf8 !important; }

        /* ── Sidebar ── */
        .sidebar {
            width:260px; min-height:100vh; height:100vh; position:sticky; top:0;
            padding:0; display:flex; flex-direction:column;
            border-right:1px solid var(--glass-border); z-index:100; flex-shrink:0;
            overflow-y:auto;
        }
        .sidebar-logo {
            display:flex; align-items:center; gap:.75rem;
            padding:1.5rem 1.25rem 1.25rem;
            border-bottom:1px solid var(--glass-border);
            flex-shrink:0;
        }
        .sidebar-logo img { height:36px; border-radius:4px; flex-shrink:0; }
        .sidebar-logo span {
            font-size:.95rem; font-weight:700;
            background:linear-gradient(to right,#818cf8,#c084fc);
            -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
            line-height:1.2;
        }
        .sidebar-menu {
            flex-grow:1; padding:1rem .75rem; display:flex; flex-direction:column;
        }
        .menu-section {
            display:block; width:100%;
            font-size:.62rem; font-weight:700; letter-spacing:.12em;
            color:var(--text-secondary); padding:.25rem .75rem;
            margin:1.25rem 0 .4rem; text-transform:uppercase;
        }
        .menu-item {
            display:flex; width:100%; align-items:center; gap:.75rem;
            padding:.7rem .9rem; border-radius:var(--radius-md);
            color:var(--text-secondary); transition:var(--transition-base);
            margin-bottom:.2rem; cursor:pointer; font-size:.88rem;
            border-left:3px solid transparent;
        }
        .menu-item:hover { background:rgba(99,102,241,.1); color:var(--text-main); }
        .menu-item.active { background:rgba(99,102,241,.15); color:var(--text-main); border-left-color:var(--primary-color); }
        .menu-item .icon { font-size:1rem; width:1.25rem; text-align:center; flex-shrink:0; }
        .sidebar-footer {
            padding:1rem .75rem 1.5rem; border-top:1px solid var(--glass-border); flex-shrink:0;
        }
        .logout-btn {
            display:flex; width:100%; align-items:center; gap:.75rem; color:#ef4444;
            padding:.7rem .9rem; cursor:pointer; border-radius:var(--radius-md);
            transition:var(--transition-base); font-size:.88rem; background:none; border:none;
            font-family:inherit;
        }
        .logout-btn:hover { background:rgba(239,68,68,.12); }

        /* ── Main ── */
        .main-dashboard { flex-grow:1; overflow-y:auto; min-height:100vh; }

        /* ── Top Bar ── */
        .topbar {
            position:sticky; top:0; z-index:50;
            background:rgba(2,6,23,.92); backdrop-filter:blur(16px);
            border-bottom:1px solid var(--glass-border);
            padding:.85rem 2rem; display:flex; align-items:center; gap:1.5rem;
        }
        .topbar-page-title { font-size:1rem; font-weight:700; white-space:nowrap; color:var(--text-main); min-width:max-content; }
        .topbar-search { position:relative; flex:1; }
        .topbar-search input {
            width:100%; background:rgba(255,255,255,.05); border:1px solid var(--glass-border);
            border-radius:9999px; padding:.55rem 1.1rem .55rem 2.6rem; color:var(--text-main); font-family:inherit; font-size:.88rem;
            transition:var(--transition-base);
        }
        .topbar-search input:focus { outline:none; border-color:var(--primary-color); box-shadow:0 0 0 2px rgba(99,102,241,.25); }
        .topbar-search .s-icon { position:absolute; left:.9rem; top:50%; transform:translateY(-50%); color:var(--text-secondary); font-size:.9rem; pointer-events:none; }
        .user-badge {
            display:flex; align-items:center; gap:.75rem; flex-shrink:0;
            background:var(--bg-card); padding:.4rem .9rem; border-radius:9999px; border:1px solid var(--glass-border);
        }
        .user-avatar {
            background:var(--primary-color); width:30px; height:30px; border-radius:50%;
            display:flex; align-items:center; justify-content:center; font-weight:700; font-size:.85rem; flex-shrink:0;
        }
        .role-pill { font-size:.65rem; background:var(--primary-color); padding:.15rem .5rem; border-radius:3px; font-weight:700; text-transform:uppercase; }

        /* ── Page Sections ── */
        .page-section { display:none; padding:2rem; }
        .page-section.active { display:block; }

        /* ── Section Heading ── */
        .sec-heading { font-size:1.5rem; font-weight:700; margin-bottom:.25rem; }
        .sec-sub { color:var(--text-secondary); font-size:.9rem; margin-bottom:2rem; }

        /* ── Category Filters ── */
        .cat-filters { display:flex; flex-wrap:wrap; gap:.5rem; margin-bottom:2rem; }
        .cat-btn {
            padding:.4rem 1rem; border-radius:9999px; border:1px solid var(--glass-border);
            background:transparent; color:var(--text-secondary); font-size:.8rem; cursor:pointer;
            transition:var(--transition-base); font-family:inherit;
        }
        .cat-btn:hover, .cat-btn.active { background:var(--primary-color); color:#fff; border-color:var(--primary-color); }

        /* ── Book Grid ── */
        .e-book-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(200px,1fr)); gap:1.5rem; }
        .e-book-card {
            background:var(--bg-card); border:1px solid var(--glass-border); border-radius:var(--radius-xl);
            overflow:hidden; transition:var(--transition-base); cursor:pointer; display:flex; flex-direction:column;
        }
        .e-book-card:hover { transform:translateY(-6px); border-color:var(--primary-color); box-shadow:0 20px 40px rgba(0,0,0,.4); }
        .e-book-cover { height:260px; overflow:hidden; position:relative; }
        .e-book-cover img { width:100%; height:100%; object-fit:cover; transition:transform .4s ease; }
        .e-book-card:hover .e-book-cover img { transform:scale(1.06); }
        .e-book-cover .reading-badge {
            position:absolute; top:.5rem; right:.5rem; background:rgba(99,102,241,.9);
            font-size:.65rem; font-weight:700; padding:.2rem .5rem; border-radius:4px; text-transform:uppercase;
        }
        .e-book-body { padding:1rem; flex-grow:1; display:flex; flex-direction:column; gap:.3rem; }
        .e-book-cat { font-size:.7rem; font-weight:700; color:var(--primary-color); text-transform:uppercase; letter-spacing:.05em; }
        .e-book-title { font-size:.95rem; font-weight:700; color:var(--text-main); line-height:1.3; }
        .e-book-author { font-size:.8rem; color:var(--text-secondary); }
        .e-book-actions { display:flex; gap:.5rem; margin-top:auto; padding-top:.75rem; }
        .btn-read {
            flex:1; padding:.45rem; background:var(--primary-color); color:#fff; border:none;
            border-radius:var(--radius-sm); font-size:.8rem; font-weight:600; cursor:pointer;
            transition:var(--transition-base); font-family:inherit;
        }
        .btn-read:hover { background:var(--primary-hover); }
        .btn-mark {
            padding:.45rem .7rem; background:transparent; border:1px solid var(--glass-border);
            color:var(--text-secondary); border-radius:var(--radius-sm); font-size:.85rem; cursor:pointer;
            transition:var(--transition-base);
        }
        .btn-mark:hover, .btn-mark.marked { color:#f59e0b; border-color:#f59e0b; }

        /* ── Currently Reading ── */
        .reading-shelf { display:grid; grid-template-columns:repeat(auto-fill, minmax(320px,1fr)); gap:1.5rem; }
        .reading-card {
            background:var(--bg-card); border:1px solid var(--glass-border); border-radius:var(--radius-xl);
            padding:1.25rem; display:flex; gap:1rem; align-items:flex-start;
            transition:var(--transition-base);
        }
        .reading-card:hover { border-color:var(--primary-color); }
        .reading-thumb { width:70px; height:95px; border-radius:var(--radius-sm); object-fit:cover; flex-shrink:0; }
        .reading-info { flex-grow:1; }
        .reading-info h4 { font-size:.95rem; font-weight:700; margin-bottom:.2rem; }
        .reading-info p { font-size:.8rem; color:var(--text-secondary); margin-bottom:.75rem; }
        .progress-bar-wrap { background:rgba(255,255,255,.08); border-radius:9999px; height:5px; margin-bottom:.4rem; }
        .progress-bar-fill { height:5px; border-radius:9999px; background:linear-gradient(to right,#6366f1,#c084fc); }
        .progress-label { font-size:.75rem; color:var(--text-secondary); }
        .btn-continue {
            margin-top:.75rem; padding:.35rem .9rem; background:var(--primary-color); color:#fff;
            border:none; border-radius:var(--radius-sm); font-size:.78rem; font-weight:600;
            cursor:pointer; transition:var(--transition-base); font-family:inherit;
        }
        .btn-continue:hover { background:var(--primary-hover); }

        /* ── Empty State ── */
        .empty-state { text-align:center; padding:4rem 2rem; color:var(--text-secondary); }
        .empty-state .icon { font-size:3rem; margin-bottom:1rem; }
        .empty-state h3 { color:var(--text-main); margin-bottom:.5rem; }

        /* ── Admin Panel ── */
        .admin-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(220px,1fr)); gap:1.5rem; margin-bottom:2.5rem; }
        .admin-stat {
            background:var(--bg-card); border:1px solid var(--glass-border); border-radius:var(--radius-xl);
            padding:1.5rem; transition:var(--transition-base);
        }
        .admin-stat:hover { border-color:var(--primary-color); transform:translateY(-4px); }
        .admin-stat .stat-icon { font-size:2rem; margin-bottom:.75rem; }
        .admin-stat .stat-val { font-size:2rem; font-weight:800; color:var(--text-main); }
        .admin-stat .stat-lbl { font-size:.8rem; color:var(--text-secondary); margin-top:.25rem; }

        /* Upload Form */
        .upload-card {
            background:var(--bg-card); border:1px solid var(--glass-border); border-radius:var(--radius-xl); padding:2rem; margin-bottom:2rem;
        }
        .upload-card h3 { font-size:1.1rem; font-weight:700; margin-bottom:1.5rem; }
        .form-row { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
        .form-field { display:flex; flex-direction:column; gap:.4rem; margin-bottom:1rem; }
        .form-field label { font-size:.8rem; color:var(--text-secondary); font-weight:600; }
        .form-field input, .form-field select, .form-field textarea {
            background:rgba(255,255,255,.05); border:1px solid var(--glass-border);
            border-radius:var(--radius-md); padding:.65rem .9rem; color:var(--text-main);
            font-family:inherit; font-size:.88rem; transition:var(--transition-base); resize:vertical;
        }
        .form-field input:focus, .form-field select:focus, .form-field textarea:focus { outline:none; border-color:var(--primary-color); }
        .form-field select option { background:var(--bg-dark); }
        .btn-upload {
            padding:.65rem 1.75rem; background:var(--primary-color); color:#fff; border:none;
            border-radius:9999px; font-weight:600; cursor:pointer; transition:var(--transition-base); font-family:inherit;
        }
        .btn-upload:hover { background:var(--primary-hover); transform:translateY(-2px); box-shadow:0 8px 20px rgba(99,102,241,.4); }

        /* Book Table */
        .book-table { width:100%; border-collapse:collapse; }
        .book-table th { text-align:left; font-size:.75rem; font-weight:700; color:var(--text-secondary); text-transform:uppercase; letter-spacing:.05em; padding:.75rem 1rem; border-bottom:1px solid var(--glass-border); }
        .book-table td { padding:.9rem 1rem; border-bottom:1px solid rgba(255,255,255,.04); font-size:.88rem; vertical-align:middle; }
        .book-table tr:hover td { background:rgba(255,255,255,.02); }
        .tbl-cover { width:40px; height:55px; border-radius:4px; object-fit:cover; }
        .tbl-cat { font-size:.7rem; font-weight:700; background:rgba(99,102,241,.15); color:var(--primary-color); padding:.15rem .5rem; border-radius:4px; }
        .btn-del { background:rgba(239,68,68,.1); color:#ef4444; border:none; border-radius:var(--radius-sm); padding:.3rem .7rem; cursor:pointer; font-size:.78rem; transition:var(--transition-base); }
        .btn-del:hover { background:rgba(239,68,68,.25); }

        /* ── Book Reader Modal ── */
        .reader-overlay {
            position:fixed; inset:0; background:rgba(0,0,0,.95); z-index:9999;
            display:none; flex-direction:column;
        }
        .reader-overlay.open { display:flex; }
        .reader-topbar {
            display:flex; align-items:center; justify-content:space-between;
            padding:1rem 2rem; border-bottom:1px solid var(--glass-border); flex-shrink:0;
            background:rgba(2,6,23,.9); backdrop-filter:blur(12px);
        }
        .reader-title { font-size:1rem; font-weight:700; }
        .reader-author { font-size:.8rem; color:var(--text-secondary); }
        .btn-close-reader {
            background:rgba(239,68,68,.15); color:#ef4444; border:none; border-radius:var(--radius-sm);
            padding:.45rem 1rem; cursor:pointer; font-size:.85rem; font-weight:600; transition:var(--transition-base);
        }
        .btn-close-reader:hover { background:rgba(239,68,68,.3); }
        .reader-body { flex-grow:1; overflow-y:auto; display:flex; justify-content:center; padding:3rem 2rem; }
        .reader-content {
            max-width:720px; width:100%; background:rgba(15,23,42,.8); border:1px solid var(--glass-border);
            border-radius:var(--radius-xl); padding:3rem;
        }
        .reader-cover { width:100%; max-height:320px; object-fit:cover; border-radius:var(--radius-lg); margin-bottom:2rem; }
        .reader-text { color:var(--text-secondary); line-height:1.9; font-size:1rem; }
        .reader-text p { margin-bottom:1.25rem; }

        /* Notification toast */
        .toast {
            position:fixed; bottom:2rem; right:2rem; background:rgba(30,41,59,.95);
            border:1px solid var(--glass-border); border-radius:var(--radius-md);
            padding:.75rem 1.25rem; font-size:.85rem; z-index:99999;
            backdrop-filter:blur(12px); transform:translateY(100px); opacity:0;
            transition:all .3s ease; pointer-events:none;
        }
        .toast.show { transform:translateY(0); opacity:1; }
        .toast.success { border-left:3px solid #10b981; }
        .toast.info { border-left:3px solid var(--primary-color); }
    </style>
</head>
<body>
<div class="dashboard-container">
    <!-- Connection Status Badge -->
    <div id="cloudStatus" style="position:fixed; top:5px; left:5px; z-index:9999; font-size:10px; padding:2px 8px; border-radius:3px; color:white; font-weight:bold; pointer-events:none; background:rgba(239,68,68,0.5);">CHECKING CLOUD...</div>

    <!-- ═══ SIDEBAR ═══ -->
    <aside class="sidebar glass" id="sidebar">
        <div class="sidebar-logo">
            <img src="image/logo.jfif" alt="Logo">
            <span>OSS PUSTAKALAYA</span>
        </div>
        <div class="sidebar-menu" id="sidebarMenu"></div>

    <!-- ═══ MAIN ═══ -->
    <main class="main-dashboard">

        <!-- Top Bar -->
        <div class="topbar">
            <span class="topbar-page-title" id="topbarTitle">📚 Browse Library</span>
            <div class="topbar-search">
                <span class="s-icon">🔍</span>
                <input type="text" id="dashSearch" placeholder="Search books, authors, categories…">
            </div>
            <div class="user-badge">

        <!-- ── PAGE: Browse Library ── -->
        <section class="page-section active" id="page-browse">

            <div style="padding:0 2rem 2rem;">

        <!-- ── PAGE: Currently Reading ── -->
        <section class="page-section" id="page-reading">
            <div style="padding:0 2rem;">
                <div class="reading-shelf" id="readingShelf"></div>

        </section>

        <!-- ── PAGE: Admin Inventory (admin only) ── -->
        <section class="page-section" id="page-admin">

                <div class="admin-grid" id="adminStats"></div>

                <div class="upload-card">
                    <h3>➕ Add New Book</h3>
                    <form id="uploadForm">
                        <div class="form-row">
                            <div class="form-field">
                                <label>Book Title *</label>
                                <input type="text" id="newTitle" placeholder="e.g. The Great Gatsby" required>
                            </div>
                            <div class="form-field">
                                <label>Author *</label>
                                <input type="text" id="newAuthor" placeholder="e.g. F. Scott Fitzgerald" required>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-field">
                                <label>Category *</label>
                                <select id="newCategory" required>
                                    <option value="" disabled selected>Select category</option>
                                    <option>Literature</option>
                                    <option>Science</option>
                                    <option>Mathematics</option>
                                    <option>History</option>
                                    <option>Self-Help</option>
                                    <option>Fiction</option>
                                    <option>Technology</option>
                                    <option>Philosophy</option>
                                    <option>Biography</option>
                                    <option>Other</option>
                                </select>
                            </div>
                            <div class="form-field">
                                <label>Cover Image URL</label>
                                <input type="url" id="newCover" placeholder="https://…">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-field">
                                <label>Book File (PDF or EPUB) *</label>
                                <input type="file" id="newFile" accept="application/pdf,application/epub+zip" required style="padding: 0.45rem 0.9rem;">
                            </div>
                            <div class="form-field">
                                <label>Description / Summary</label>
                                <textarea id="newDesc" rows="3" placeholder="Brief description of the book…"></textarea>
                            </div>
                        </div>
                        <div style="display:flex; gap:1rem;">
                            <button type="submit" class="btn-upload">🚀 Add Book to Library</button>
                            <button type="button" class="btn-sync" id="syncBtn" onclick="syncLocalToCloud()" style="background:rgba(255,255,255,0.05); border:1px dashed var(--glass-border); color:var(--text-secondary); padding:.45rem 1rem; border-radius:var(--radius-sm); font-size:.85rem; cursor:pointer; flex-grow:1;">☁️ Sync Local Books to Cloud</button>

                    </form>
                </div>

                <div class="upload-card">

                    <table class="book-table" id="adminBookTable">

                            <tr>
                                <th>Cover</th>
                                <th>Title</th>
                                <th>Author</th>
                                <th>Category</th>

                        </thead>
                        <tbody id="adminTableBody"></tbody>
                    </table>
                </div>
            </div>
        </section>

    </main>
</div>

<!-- ═══ BOOK READER MODAL ═══ -->

    <div class="reader-topbar">
        <div>
            <div class="reader-title" id="readerTitle">Book Title</div>
            <div class="reader-author" id="readerAuthor">Author</div>

</div>

    <script id="main-supabase" src="./supabase.js" onerror="handleScriptError()"></script>
    <script>
    function handleScriptError() {
       console.warn("Local supabase.js blocked by browser security.");
       window.SUPABASE_BLOCKED = true;
       var fallback = document.createElement('script');
       fallback.src = "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js";
       document.head.appendChild(fallback);
    }

    // ═══════════════════════════════════════════════
    //  SUPABASE CONNECTION (STICKY VERSION)
    // ═══════════════════════════════════════════════
    var supabaseUrl = 'https://vmyzdpgcrzagyaowimng.supabase.co';
    var supabaseKey = 'sb_publishable_eBwucaUCu0Y29GvhRQfKoA_ZhqWxplS';
    var supabase = null;
    window.lastCloudError = "Awaiting cloud signal...";
    var lastPingTime = 0;
    var pingInProgress = false;

    function initSupabase() {
        if (!window.supabase) return false;
        if (!supabase) {
            try { 
                supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
                window.supabaseClient = supabase; 
                console.log("Client launched.");
            } catch (e) { 
                window.lastCloudError = "INIT_CRASH: " + e.message;
                return false;
            }
        }

        // Polite Heartbeat (One ping at a time)
        if (window.lastCloudError !== "SUCCESS" && !pingInProgress) {
            var now = Date.now();
            if (now - lastPingTime > 2000) { // Wait 2 seconds between retries
                lastPingTime = now;
                pingInProgress = true;
                console.log("Pinging Cloud...");
                
                supabase.from('books').select('id').limit(1).then(function(res) {
                    pingInProgress = false;
                    if (res.error) {
                        window.lastCloudError = "CLOUD_REJECTED: " + res.error.message;
                    } else {
                        window.lastCloudError = "SUCCESS";
                        console.info("HEARTBEAT SUCCESS!");
                    }
                    updateBadgeUI();
                }).catch(function(err) {
                    pingInProgress = false;
                    window.lastCloudError = "NETWORK_ERROR: " + err.message;
                    updateBadgeUI();
                });
            }
        }
        
        return window.lastCloudError === "SUCCESS";
    }

    // Patient Retry Loop
    var retryTimer = setInterval(function() {
        if (initSupabase()) { 
            console.log("Connection Established. Closing loop.");
            clearInterval(retryTimer);
            updateBadgeUI();
            
            // VICTORY TRIGGER: Fetch real data now!
            fetchCloudBooks();
        }
    }, 500); 

    async function fetchCloudBooks() {
        if (!supabase) return;
        console.log("Fetching Cloud Books...");
        try {
            const { data, error } = await supabase.from('books').select('*').order('created_at', { ascending: false });
            if (error) throw error;
            if (data && data.length > 0) {
                // Wipe local and use cloud!
                allBooks = data;
                buildCatFilters();
                renderAdminPage();
                renderBrowse();
                showToast('☁️ Cloud Library Synced!', 'success');
            }
        } catch (e) {
            console.warn("Could not fetch cloud data, staying in local mode.", e);
        }
    }
    </script>

<script>

// Load books from localStorage (admin may have added more)
function getBooksFallback() {
    var saved = localStorage.getItem('pustLibraryBooks');
    return saved ? JSON.parse(saved) : DEFAULT_BOOKS.slice();
}
function saveBooks(b) { localStorage.setItem('pustLibraryBooks', JSON.stringify(b)); }

// Currently Reading
function getReading() {
    var s = localStorage.getItem('pustReading'); return s ? JSON.parse(s) : [];
}
function saveReading(r) { localStorage.setItem('pustReading', JSON.stringify(r)); }
function isReading(id) { return getReading().indexOf(id) !== -1; }
function toggleReading(id) {
    var r = getReading(), idx = r.indexOf(id);
    if (idx === -1) r.push(id); else r.splice(idx, 1);
    saveReading(r);
    return idx === -1;
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
var currentRole = 'student';
var currentUser = 'User';
var allBooks = [];
var activeCat = 'All';
var searchTerm = '';

document.addEventListener('DOMContentLoaded', function() {
    var sessionData = localStorage.getItem('userSession');
    if (!sessionData) { window.location.href = 'index.html'; return; }

    var session = JSON.parse(sessionData);
    currentUser = session.username;
    currentRole = session.role;
    
    // Fallback immediately
    allBooks = getBooksFallback();
    
    // Fetch live data in background
    if (supabase) {
        supabase.from('books').select('*').then(function(result) {
            if (!result.error && result.data && result.data.length > 0) {
                allBooks = result.data;
                // Re-render UI chunks now that data loaded
                renderBrowse();
                if (currentRole === 'admin') renderAdminPage();
                if (currentRole === 'student' || currentRole === 'teacher') renderReading();
            }
        }).catch(function(err) {
            console.error("Supabase fetch error:", err);
        });
    }

    // Header badges
    document.getElementById('userInitial').textContent = currentUser.charAt(0).toUpperCase();
    document.getElementById('userNameBadge').textContent = currentUser;
    document.getElementById('roleBadge').textContent = currentRole.toUpperCase();

    buildSidebar();
    buildCatFilters();
    renderBrowse();

    // Update Cloud Status Badge (Diagnostic Version)
    function updateBadgeUI() {
        var statusBadge = document.getElementById('cloudStatus');
        if (!statusBadge) return;

        if (window.lastCloudError === "SUCCESS") {
            statusBadge.textContent = '☁️ CLOUD CONNECTED';
            statusBadge.className = 'status-badge success';
            statusBadge.style.boxShadow = '0 0 10px rgba(16,185,129,0.5)';
            statusBadge.onclick = function() { alert('Cloud is active and syncing!'); };
            
            // Activate Sync Button
            var sBtn = document.getElementById('syncBtn');
            if (sBtn) sBtn.classList.add('ready');
        } else if (window.location.protocol === 'file:') {
            statusBadge.textContent = '⚠️ SECURITY BLOCKED (Fixing...)';
            statusBadge.style.background = '#f59e0b';
            statusBadge.style.pointerEvents = 'auto';
            statusBadge.style.cursor = 'help';
            
            // AUTO-FIX: Attempt to jump to the local server if it's already running
            var jumpTry = new Image();
            jumpTry.onload = function() { window.location.href = 'http://localhost:3000/dashboard.html'; };
            jumpTry.src = 'http://localhost:3000/image/logo.jfif?' + Date.now();
            
            statusBadge.onclick = function() {
                if (confirm('BROWSER SECURITY ERROR\n\nYou opened the file directly, which blocks the Cloud.\n\nDo you want to try to jump to the "Unlocked" version?')) {
                    window.location.href = 'http://localhost:3000/dashboard.html';
                }
            };
        } else {
            statusBadge.textContent = '🏠 LOCAL MODE (Detailed Error)';
            statusBadge.style.background = 'rgba(239,68,68,0.9)'; 
            statusBadge.style.pointerEvents = 'auto';
            statusBadge.style.cursor = 'pointer';
            statusBadge.onclick = function() { 
                alert('CLOUD CONNECTION ERROR:\n\nMessage: ' + window.lastCloudError + '\n\nTip: If it says "NETWORK_ERROR", your office/school firewall might be blocking Supabase.'); 
            };
        }
    }
    updateBadgeUI();

    // Search
    document.getElementById('dashSearch').addEventListener('input', function(e) {

    });

    document.getElementById('closeReader').addEventListener('click', closeReader);

    // Admin upload form

// ═══════════════════════════════════════════════
//  SIDEBAR
// ═══════════════════════════════════════════════
function buildSidebar() {
    var readerMenu = [
        { icon:'🏠', label:'Browse Library', page:'browse' },
        { icon:'📖', label:'Currently Reading', page:'reading' }
    ];
    var adminMenu = [
        { icon:'🗄️', label:'Book Inventory', page:'admin' },
        { icon:'🏠', label:'Browse Library', page:'browse' }
    ];
    var items = currentRole === 'admin' ? adminMenu : readerMenu;

    var html = '<div class="menu-section" style="margin-top:0.5rem;">Navigation</div>';
    items.forEach(function(item, i) {
        html += '<div class="menu-item' + (i===0?' active':'') + '" data-page="' + item.page + '" onclick="switchPage(\'' + item.page + '\')">';
        html += '<span class="icon">' + item.icon + '</span>' + item.label + '</div>';
    });
    
    // Add logout explicitly inside menu to guarantee correct order
    html += '<div style="margin-top:auto; padding-top:1.5rem; border-top:1px solid var(--glass-border);">';
    html += '<button class="logout-btn" onclick="doLogout()">';
    html += '<span class="icon">🚪</span> Logout</button></div>';

    document.getElementById('sidebarMenu').innerHTML = html;
}

function doLogout() {
    localStorage.removeItem('userSession');
    window.location.href = 'index.html';
}

function switchPage(page) {
    document.querySelectorAll('.menu-item').forEach(function(el) { el.classList.remove('active'); });
    var activeItem = document.querySelector('[data-page="' + page + '"]');
    if (activeItem) {
        activeItem.classList.add('active');
        document.getElementById('topbarTitle').innerHTML = activeItem.innerHTML;
    }

    document.querySelectorAll('.page-section').forEach(function(s) { s.classList.remove('active'); });
    var sec = document.getElementById('page-' + page);
    if (sec) sec.classList.add('active');

    if (page === 'reading') renderReading();
    if (page === 'admin') renderAdminPage();
}

// ═══════════════════════════════════════════════
//  CATEGORY FILTERS
// ═══════════════════════════════════════════════
function buildCatFilters() {
    var cats = ['All'];
    allBooks.forEach(function(b) { if (cats.indexOf(b.category) === -1) cats.push(b.category); });
    var html = cats.map(function(c) {
        return '<button class="cat-btn' + (c === activeCat ? ' active' : '') + '" onclick="setCat(\'' + c + '\')">' + c + '</button>';
    }).join('');
    document.getElementById('catFilters').innerHTML = html;
}

function setCat(cat) {
    activeCat = cat;
    document.querySelectorAll('.cat-btn').forEach(function(b) {
        b.classList.toggle('active', b.textContent === cat);
    });
    renderBrowse();
}

// ═══════════════════════════════════════════════
//  BROWSE GRID
// ═══════════════════════════════════════════════
function renderBrowse() {
    var filtered = allBooks.filter(function(b) {
        var matchCat = activeCat === 'All' || b.category === activeCat;
        var matchSearch = !searchTerm || 
            b.title.toLowerCase().indexOf(searchTerm) !== -1 || 
            b.author.toLowerCase().indexOf(searchTerm) !== -1 || 
            b.category.toLowerCase().indexOf(searchTerm) !== -1;
        return matchCat && matchSearch;
    });

    var grid = document.getElementById('browseGrid');
    if (!filtered.length) {
        grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="icon">📭</div><h3>No books found</h3><p>Try a different category or search term.</p></div>';
        return;
    }
    var html = '';
    for (var i = 0; i < filtered.length; i++) {
        var b = filtered[i];
        var reading = isReading(b.id);
        html += '<div class="e-book-card" style="animation:fadeInUp .4s ease-out ' + (i * 0.05) + 's backwards">'
            + '<div class="e-book-cover">'
            + '<img src="' + (b.cover || 'https://images.unsplash.com/photo-1507842217343-583bb7270b66?w=400') + '" alt="' + b.title + '" loading="lazy" onerror="this.src=\'https://images.unsplash.com/photo-1507842217343-583bb7270b66?w=400\'">'
            + (reading ? '<span class="reading-badge">Reading</span>' : '')
            + '</div>'
            + '<div class="e-book-body">'
            + '<span class="e-book-cat">' + b.category + '</span>'
            + '<div class="e-book-title">' + b.title + '</div>'
            + '<div class="e-book-author">by ' + b.author + '</div>'
            + '<div class="e-book-actions">'
            + '<button class="btn-read" onclick="openReader(\'' + b.id + '\')">📖 Read</button>'
            + '<button class="btn-mark' + (reading?' marked':'') + '" id="mark-' + b.id + '" onclick="handleMark(\'' + b.id + '\')" title="Mark as Reading">🔖</button>'
            + '</div>'
            + '</div></div>';
    }
    grid.innerHTML = html;
}

function handleMark(id) {
    var added = toggleReading(id);
    showToast(added ? '🔖 Added to Currently Reading!' : '✅ Removed from Reading list', added ? 'info' : 'success');
    renderBrowse();
}

// ═══════════════════════════════════════════════
//  CURRENTLY READING PAGE
// ═══════════════════════════════════════════════
function renderReading() {
    var ids = getReading();
    var shelf = document.getElementById('readingShelf');
    if (!ids.length) {
        shelf.innerHTML = '<div class="empty-state"><div class="icon">📚</div><h3>No books yet</h3><p>Browse the library and mark books as "Currently Reading" to see them here.</p></div>';
        return;
    }
    var readingBooks = allBooks.filter(function(b) { return ids.indexOf(b.id) !== -1; });
    shelf.innerHTML = readingBooks.map(function(b) {
        var pct = Math.floor(Math.random() * 60) + 10; // simulated progress
        return '<div class="reading-card">'
            + '<img class="reading-thumb" src="' + (b.cover || '') + '" alt="' + b.title + '" onerror="this.src=\'https://images.unsplash.com/photo-1507842217343-583bb7270b66?w=400\'">'
            + '<div class="reading-info">'
            + '<h4>' + b.title + '</h4>'
            + '<p>by ' + b.author + ' · ' + b.category + '</p>'
            + '<div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:' + pct + '%"></div></div>'
            + '<span class="progress-label">' + pct + '% completed</span>'
            + '<br><button class="btn-continue" onclick="openReader(\'' + b.id + '\')">Continue Reading →</button>'
            + '</div></div>';
    }).join('');
}

// ═══════════════════════════════════════════════
//  BOOK READER
// ═══════════════════════════════════════════════
function openReader(id) {
    var book = null;
    for (var i=0; i<allBooks.length; i++) {
        if (allBooks[i].id == id) { book = allBooks[i]; break; }
    }
    if (!book) return; 
    
    var modal = document.getElementById('readerOverlay');
    var textContent = document.getElementById('readerTextContent');
    var pdfViewer = document.getElementById('pdfViewer');
    
    document.getElementById('readerTitle').textContent = book.title;
    document.getElementById('readerAuthor').textContent = 'by ' + book.author;
    
    // Check if we have a PDF to show
    if (book.file_url) {
        textContent.style.display = 'none';
        pdfViewer.style.display = 'block';
        pdfViewer.src = book.file_url;
    } else {
        pdfViewer.style.display = 'none';
        pdfViewer.src = '';
        textContent.style.display = 'block';
        document.getElementById('readerCover').src = book.cover || '';
        document.getElementById('readerText').innerHTML =
            '<h2 style="color:var(--text-main);margin-bottom:1.5rem;">' + book.title + '</h2>'
            + '<p><strong style="color:var(--text-main)">Author:</strong> ' + book.author + '</p>'
            + '<p><strong style="color:var(--text-main)">Category:</strong> ' + book.category + '</p>'
            + '<hr style="border-color:var(--glass-border);margin:1.5rem 0;">'
            + '<p>' + (book.description || 'No description available.') + '</p>'
            + '<p style="padding:1rem; background:rgba(255,165,0,0.1); border-radius:8px; border-left:4px solid orange;">'
            + '<strong>Note:</strong> No PDF file is attached to this book. You are viewing the book summary. To read via PDF, please upload a PDF file when adding the book to the library.</p>';
    }
    
    modal.classList.add('open');
    document.body.style.overflow = 'hidden';
    if (!isReading(id)) { toggleReading(id); renderBrowse(); }
}
function closeReader() {
    document.getElementById('readerOverlay').classList.remove('open');
    document.body.style.overflow = '';
}

// ═══════════════════════════════════════════════
//  ADMIN PAGE
// ═══════════════════════════════════════════════
function renderAdminPage() {
    var cats = {};
    allBooks.forEach(function(b) { cats[b.category] = (cats[b.category]||0)+1; });
    var catCount = Object.keys(cats).length;

    document.getElementById('adminStats').innerHTML = [
        { icon:'📚', val:allBooks.length, lbl:'Total Books in Library' },
        { icon:'🗂️', val:catCount, lbl:'Book Categories' },
        { icon:'👥', val:'450', lbl:'Active Readers' },
        { icon:'📖', val:getReading().length, lbl:'Books Currently Being Read' }
    ].map(function(s) {
        return '<div class="admin-stat"><div class="stat-icon">' + s.icon + '</div><div class="stat-val">' + s.val + '</div><div class="stat-lbl">' + s.lbl + '</div></div>';
    }).join('');

    document.getElementById('adminTableBody').innerHTML = allBooks.map(function(b) {
        return '<tr>'
            + '<td><img class="tbl-cover" src="' + (b.cover||'') + '" alt="" onerror="this.style.display=\'none\'"></td>'
            + '<td><strong>' + b.title + '</strong></td>'
            + '<td style="color:var(--text-secondary)">' + b.author + '</td>'
            + '<td><span class="tbl-cat">' + b.category + '</span></td>'
            + '<td><button class="btn-del" onclick="deleteBook(\'' + b.id + '\')">🗑 Remove</button></td>'
            + '</tr>';
    }).join('');
}

function handleUpload(e) {
    e.preventDefault();
    // Initial checks done locally now to allow Offline Mode
    var title = document.getElementById('newTitle').value.trim();
    var author = document.getElementById('newAuthor').value.trim();
    var category = document.getElementById('newCategory').value;
    var cover = document.getElementById('newCover').value.trim();
    var desc = document.getElementById('newDesc').value.trim();
    var fileInput = document.getElementById('newFile');
    
    if (!title || !author || !category) return;
    var file = fileInput ? fileInput.files[0] : null;
    
    var btn = e.target.querySelector('.btn-upload');
    var originalText = btn.textContent;
    btn.textContent = 'Uploading...';
    btn.disabled = true;

    var finishUpload = function(file_url) {
        var new_book = {
            title: title,
            author: author,
            category: category,
            cover: cover || 'https://images.unsplash.com/photo-1507842217343-583bb7270b66?w=400',
            description: desc,
            file_url: file_url
        };

        // PRIORITIZE CLOUD
        if (window.lastCloudError === "SUCCESS" && supabase) {
            supabase.from('books').insert([new_book]).select().then(function(result) {
                if (result.error) throw result.error;
                if (result.data && result.data.length > 0) {
                    allBooks.push(result.data[0]);
                }
                completeUI();
                showToast('✅ Uploaded to Cloud!', 'success');
            }).catch(function(err) {
                console.error("DB Error", err);
                showToast('❌ Cloud Error: ' + err.message, 'error');
                btn.textContent = originalText;
                btn.disabled = false;
            });
        } else {
            // Local fallback (Offline mode)
            new_book.id = 'loc-' + Date.now();
            allBooks.push(new_book);
            var saved = getBooksFallback();
            saved.push(new_book);
            saveBooks(saved);
            completeUI();
            showToast('💾 Saved Locally (No Cloud Sync)', 'info');
        }
        
        function completeUI() {
            e.target.reset();
            btn.textContent = originalText;
            btn.disabled = false;
            buildCatFilters();
            renderAdminPage();
            renderBrowse();
        }
    };

    if (file && supabase) {
        var fileExt = file.name.split('.').pop();
        var fileName = Date.now() + '-' + Math.random().toString(36).substring(2) + '.' + fileExt;
        var filePath = 'books/' + fileName;
        
        supabase.storage.from('library-files').upload(filePath, file).then(function(upRes) {
            if (upRes.error) throw upRes.error;
            var pubRes = supabase.storage.from('library-files').getPublicUrl(filePath);
            finishUpload(pubRes.data.publicUrl);
        }).catch(function(err) {
            console.error(err);
            showToast('❌ Upload Error: ' + err.message, 'error');
            btn.textContent = originalText;
            btn.disabled = false;
        });
    } else {
        finishUpload('');
    }
}

function deleteBook(id) {
    if (!confirm('Remove this book from the library?')) return;
    
    var performLocalDelete = function() {
        allBooks = allBooks.filter(function(b) { return b.id != id; });
        var savedBooks = getBooksFallback().filter(function(b) { return b.id != id; });
        saveBooks(savedBooks);
        buildCatFilters();
        renderAdminPage();
        renderBrowse();
        showToast('Book removed.', 'info');
    };

    if (window.lastCloudError === "SUCCESS" && supabase && typeof id === 'string' && id.indexOf('loc-') === -1) {
        supabase.from('books').delete().eq('id', id).then(function(result) {
            if (result.error) throw result.error;
            performLocalDelete();
        }).catch(function(err) {
            console.error(err);
            showToast('❌ Cloud Delete failed.', 'error');
            performLocalDelete();
        });
    } else {
        performLocalDelete();
    }
}


// ═══════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════
var toastTimer;
function showToast(msg, type) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + (type||'info') + ' show';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function() { t.classList.remove('show'); }, 2800);
}
// ==================== UNIVERSAL FORCE SYNC ====================
async function syncLocalToCloud() {
    // 1. Force a "Live" check if it's currently RED
    if (window.lastCloudError !== "SUCCESS" && supabase) {
        console.log("Forcing a Live Ping...");
        const res = await supabase.from('books').select('id').limit(1);
        if (!res.error) window.lastCloudError = "SUCCESS";
    }

    if (window.lastCloudError !== "SUCCESS" || !supabase) {
        alert("Sync Blocked: " + window.lastCloudError + "\n\nPlease wait for the cloud to turn Green.");
        return;
    }
    
    // 2. Be more aggressive: All books are local unless they have UUID-style IDs
    var localBooks = getBooksFallback().filter(function(b) { 
        var isLocal = typeof b.id === 'number' || (typeof b.id === 'string' && (b.id.indexOf('loc-') !== -1 || b.id.length < 20));
        return isLocal;
    });
    
    if (localBooks.length === 0) {
        alert("Your cloud is already up to date! (0 local books found)");
        return;
    }
    
    if (!confirm("Found " + localBooks.length + " local books. Sync to Cloud now?")) return;
    
    var btn = document.getElementById('syncBtn');
    var originalText = btn.textContent;
    btn.textContent = '🔄 Global Syncing...';
    btn.disabled = true;
    
    var successCount = 0;
    for (var b of localBooks) {
        var cloudBook = {...b};
        delete cloudBook.id; // Cloud auto-generates UUID
        try {
            var res = await supabase.from('books').insert([cloudBook]).select();
            if (res.error) throw res.error;
            
            // Clean up local storage
            var saved = getBooksFallback().filter(function(lb) { return String(lb.id) !== String(b.id); });
            saveBooks(saved);
            successCount++;
        } catch (e) { console.error("Sync error", e); }
    }
    
    btn.textContent = originalText;
    btn.disabled = false;
    alert("Full Force Sync Complete! " + successCount + " books pushed to cloud.");
    window.location.reload();
}
</script>
</body>
</html>
